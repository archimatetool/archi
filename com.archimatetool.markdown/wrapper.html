<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            margin: 0 0 0 5px;
            padding: 0;
        }
        
        table, th, td {
            border: 1px solid #ccc;
            border-collapse: collapse;
            padding: 5px 8px;
        }
        
        a {
            color: #0000ff
        }
        
        .dark-mode {
            background-color: rgb(68, 68, 68);
            color: rgb(226, 226, 226);
        }
        
        .dark-mode a {
            color: rgb(144, 255, 255);
        }
        
    </style>
</head>
<body class="%s">
    <div class="markdown-body">%s</div>
</body>
</html>
